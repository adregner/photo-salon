      <g transform="rotate(146.25)"><ellipse cx="0" cy="-112" rx="19" ry="74"/></g>
      <g transform="rotate(168.75)"><ellipse cx="0" cy="-112" rx="19" ry="74"/></g>
      <g transform="rotate(191.25)"><ellipse cx="0" cy="-112" rx="19" ry="74"/></g>
      <g transform="rotate(213.75)"><ellipse cx="0" cy="-112" rx="19" ry="74"/></g>
      <g transform="rotate(236.25)"><ellipse cx="0" cy="-112" rx="19" ry="74"/></g>
      <g transform="rotate(258.75)"><ellipse cx="0" cy="-112" rx="19" ry="74"/></g>
      <g transform="rotate(281.25)"><ellipse cx="0" cy="-112" rx="19" ry="74"/></g>
      <g transform="rotate(303.75)"><ellipse cx="0" cy="-112" rx="19" ry="74"/></g>
      <g transform="rotate(326.25)"><ellipse cx="0" cy="-112" rx="19" ry="74"/></g>
      <g transform="rotate(348.75)"><ellipse cx="0" cy="-112" rx="19" ry="74"/></g>
        </g>
        <g fill="url(#petal)" stroke="#d8d0bd" stroke-width="1.2">
      <g transform="rotate(0.00)"><ellipse cx="0" cy="-120" rx="23" ry="86"/></g>
      <g transform="rotate(22.50)"><ellipse cx="0" cy="-120" rx="23" ry="86"/></g>
      <g transform="rotate(45.00)"><ellipse cx="0" cy="-120" rx="23" ry="86"/></g>
      <g transform="rotate(67.50)"><ellipse cx="0" cy="-120" rx="23" ry="86"/></g>
      <g transform="rotate(90.00)"><ellipse cx="0" cy="-120" rx="23" ry="86"/></g>
      <g transform="rotate(112.50)"><ellipse cx="0" cy="-120" rx="23" ry="86"/></g>
      <g transform="rotate(135.00)"><ellipse cx="0" cy="-120" rx="23" ry="86"/></g>
      <g transform="rotate(157.50)"><ellipse cx="0" cy="-120" rx="23" ry="86"/></g>
      <g transform="rotate(180.00)"><ellipse cx="0" cy="-120" rx="23" ry="86"/></g>
      <g transform="rotate(202.50)"><ellipse cx="0" cy="-120" rx="23" ry="86"/></g>
      <g transform="rotate(225.00)"><ellipse cx="0" cy="-120" rx="23" ry="86"/></g>
      <g transform="rotate(247.50)"><ellipse cx="0" cy="-120" rx="23" ry="86"/></g>
      <g transform="rotate(270.00)"><ellipse cx="0" cy="-120" rx="23" ry="86"/></g>
      <g transform="rotate(292.50)"><ellipse cx="0" cy="-120" rx="23" ry="86"/></g>
      <g transform="rotate(315.00)"><ellipse cx="0" cy="-120" rx="23" ry="86"/></g>
      <g transform="rotate(337.50)"><ellipse cx="0" cy="-120" rx="23" ry="86"/></g>
        </g>
        <circle r="60" fill="url(#core)"/>
        <g>
      <circle cx="46.0" cy="0.0" r="5" fill="#9a6614" opacity="0.55"/>
      <circle cx="41.4" cy="20.0" r="5" fill="#9a6614" opacity="0.55"/>
      <circle cx="28.7" cy="36.0" r="5" fill="#9a6614" opacity="0.55"/>
      <circle cx="10.2" cy="44.8" r="5" fill="#9a6614" opacity="0.55"/>
      <circle cx="-10.2" cy="44.8" r="5" fill="#9a6614" opacity="0.55"/>
      <circle cx="-28.7" cy="36.0" r="5" fill="#9a6614" opacity="0.55"/>
      <circle cx="-41.4" cy="20.0" r="5" fill="#9a6614" opacity="0.55"/>
      <circle cx="-46.0" cy="0.0" r="5" fill="#9a6614" opacity="0.55"/>
      <circle cx="-41.4" cy="-20.0" r="5" fill="#9a6614" opacity="0.55"/>
      <circle cx="-28.7" cy="-36.0" r="5" fill="#9a6614" opacity="0.55"/>
      <circle cx="-10.2" cy="-44.8" r="5" fill="#9a6614" opacity="0.55"/>
      <circle cx="10.2" cy="-44.8" r="5" fill="#9a6614" opacity="0.55"/>
      <circle cx="28.7" cy="-36.0" r="5" fill="#9a6614" opacity="0.55"/>
      <circle cx="41.4" cy="-20.0" r="5" fill="#9a6614" opacity="0.55"/>
      <circle cx="26.6" cy="8.7" r="5" fill="#9a6614" opacity="0.55"/>
      <circle cx="14.8" cy="23.7" r="5" fill="#9a6614" opacity="0.55"/>
      <circle cx="-3.9" cy="27.7" r="5" fill="#9a6614" opacity="0.55"/>
      <circle cx="-20.8" cy="18.7" r="5" fill="#9a6614" opacity="0.55"/>
      <circle cx="-28.0" cy="1.0" r="5" fill="#9a6614" opacity="0.55"/>
      <circle cx="-22.1" cy="-17.2" r="5" fill="#9a6614" opacity="0.55"/>
      <circle cx="-5.8" cy="-27.4" r="5" fill="#9a6614" opacity="0.55"/>
      <circle cx="13.1" cy="-24.7" r="5" fill="#9a6614" opacity="0.55"/>
      <circle cx="26.0" cy="-10.5" r="5" fill="#9a6614" opacity="0.55"/>
        </g>
        <circle cx="-18" cy="-20" r="18" fill="#fde6a0" opacity="0.55"/>
      </g>

      <rect x="304" y="196" width="416" height="480" fill="url(#pvig)"/>
      <rect x="304" y="196" width="416" height="480" filter="url(#grain)" opacity="0.05"/>
    </g>

    <!-- 45 deg mat bevel -->
    <rect x="304" y="196" width="416" height="480" fill="none" stroke="#fbf7ef" stroke-width="2" opacity="0.7"/>
    <path d="M304 676 L304 196 L720 196" fill="none" stroke="#ffffff" stroke-width="3" opacity="0.5"/>
    <path d="M720 196 L720 676 L304 676" fill="none" stroke="#9c917f" stroke-width="3" opacity="0.45"/>
    <rect x="304" y="196" width="416" height="480" fill="none" stroke="#000000" stroke-width="1" opacity="0.18"/>

    <rect x="1" y="1" width="1022" height="1022" rx="231" ry="231" fill="none" stroke="#ffffff" stroke-width="2" opacity="0.06"/>
  </g>
</svg>
