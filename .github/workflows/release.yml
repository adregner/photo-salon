# Builds, signs, and uploads release artifacts whenever a GitHub release is created.
#
# ── Windows secrets (Settings → Secrets and variables → Actions → Secrets) ──
#   AZURE_TENANT_ID       — Azure AD tenant ID
#   AZURE_CLIENT_ID       — service principal / app registration client ID
#   AZURE_CLIENT_SECRET   — service principal client secret
#
# ── Windows variables (Settings → Secrets and variables → Actions → Variables) ──
#   AZURE_TRUSTED_SIGNING_ENDPOINT     — endpoint hostname, e.g. wus2.codesigning.azure.net
#   AZURE_TRUSTED_SIGNING_ACCOUNT      — Trusted Signing account name
#   AZURE_TRUSTED_SIGNING_CERT_PROFILE — certificate profile name
#
# The service principal needs the "Trusted Signing Certificate Profile Signer" role
# on the Trusted Signing account in Azure Portal (Access control → Add role assignment).
#
# ── macOS secrets ────────────────────────────────────────────────────────────
#   MACOS_CERTIFICATE          — base64-encoded Developer ID Application .p12
#                                export: base64 -i cert.p12 | pbcopy
#   MACOS_CERTIFICATE_PASSWORD — password used when exporting the .p12
#   MACOS_CODESIGN_IDENTITY    — full identity string from `security find-identity`:
#                                "Developer ID Application: Your Name (TEAMID)"
#   MACOS_NOTARIZE_APPLE_ID    — Apple ID email address
#   MACOS_NOTARIZE_PASSWORD    — app-specific password (appleid.apple.com → Security)
#   MACOS_NOTARIZE_TEAM_ID     — 10-character team ID (developer.apple.com → Membership)
#
# Signing + notarization are skipped if the MACOS_CERTIFICATE secret is not set.

name: Release

on:
  release:
    types: [created]

jobs:
  # Cross-compile on Linux (fast, cheap). Signing is skipped here — no Azure vars set.
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install LLVM 19 and CMake
        run: |
          sudo apt-get update -q
          sudo apt-get install -y cmake clang-19 lld-19 llvm-19

      # /opt is root-owned; hand off to the runner before the cache step
      # so actions/cache can restore into it without sudo.
      - name: Prepare Qt host directory
        run: |
          sudo mkdir -p /opt/qt-linux
          sudo chown "$(id -un):$(id -gn)" /opt/qt-linux

      - name: Cache Qt host tools
        id: qt-cache
        uses: actions/cache@v4
        with:
          path: /opt/qt-linux
          key: qt-linux-6.11.1-gcc64

      - name: Install Qt host tools (moc/rcc for cross-compile)
        if: steps.qt-cache.outputs.cache-hit != 'true'
        run: |
          pip3 install --user --quiet aqtinstall
          export PATH="$HOME/.local/bin:$PATH"
          aqt install-qt --outputdir /opt/qt-linux linux desktop 6.11.1 linux_gcc_64 \
            --archives icu qtbase

      - name: Cache Windows cross-compile dependencies
        uses: actions/cache@v4
        with:
          path: |
            windows/msvc/include
            windows/sdk/include
            windows/qt-6.11
          key: windows-cross-deps-${{ hashFiles('fetch-windows-deps.sh') }}

      - name: Fetch windows deps
        run: ./fetch-windows-deps.sh

      - name: Build
        run: ./build-windows.sh

      - name: Upload unsigned exe
        uses: actions/upload-artifact@v4
        with:
          name: photo-salon-unsigned
          path: _build_win/photo-salon.exe
          retention-days: 1

  # Sign with native Windows tools (signtool.exe + Azure Trusted Signing DLIB)
  # and attach the result to the release.
  sign-and-release:
    runs-on: windows-latest
    needs: build
    environment: builder
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download unsigned exe
        uses: actions/download-artifact@v4
        with:
          name: photo-salon-unsigned
          path: to-sign

      - name: Sign with Azure Trusted Signing
        uses: azure/trusted-signing-action@v0
        with:
          azure-tenant-id:              ${{ secrets.AZURE_TENANT_ID }}
          azure-client-id:              ${{ secrets.AZURE_CLIENT_ID }}
          azure-client-secret:          ${{ secrets.AZURE_CLIENT_SECRET }}
          endpoint:                     https://${{ vars.AZURE_TRUSTED_SIGNING_ENDPOINT }}
          trusted-signing-account-name: ${{ vars.AZURE_TRUSTED_SIGNING_ACCOUNT }}
          certificate-profile-name:     ${{ vars.AZURE_TRUSTED_SIGNING_CERT_PROFILE }}
          files-folder:                 to-sign
          files-folder-filter:          exe
          file-digest:                  SHA256
          timestamp-rfc3161:            http://timestamp.acs.microsoft.com
          timestamp-digest:             SHA256

      - name: Upload to release
        run: gh release upload "${{ github.ref_name }}" to-sign/photo-salon.exe --clobber
        env:
          GH_TOKEN: ${{ github.token }}

  # Build, bundle, sign, notarize, and upload a macOS DMG.
  # Signing is opt-in: the job always runs; signing/notarization are skipped
  # when the MACOS_CERTIFICATE secret is absent.
  build-macos:
    runs-on: macos-latest
    environment: builder
    permissions:
      contents: write
    env:
      MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}

    steps:
      - uses: actions/checkout@v4

      - name: Cache Homebrew Qt bottles
        uses: actions/cache@v4
        with:
          path: ~/Library/Caches/Homebrew/downloads
          key: homebrew-qt-${{ runner.arch }}-6.x

      - name: Install Qt and CMake
        run: brew install qt cmake

      # Imports the Developer ID certificate into a short-lived keychain so that
      # codesign can access it non-interactively. Skipped when the secret is unset.
      - name: Import signing certificate
        if: env.MACOS_CERTIFICATE != ''
        env:
          MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/signing.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -base64 20)"
          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> "$GITHUB_ENV"

          echo "$MACOS_CERTIFICATE" | base64 --decode > "$RUNNER_TEMP/certificate.p12"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$RUNNER_TEMP/certificate.p12" \
            -P "$MACOS_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH"
          # Allow codesign to use the key without an interactive prompt
          security set-key-partition-list \
            -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

      - name: Build, bundle, sign, and notarize
        env:
          CODESIGN_IDENTITY:  ${{ secrets.MACOS_CODESIGN_IDENTITY }}
          NOTARIZE_APPLE_ID:  ${{ secrets.MACOS_NOTARIZE_APPLE_ID }}
          NOTARIZE_PASSWORD:  ${{ secrets.MACOS_NOTARIZE_PASSWORD }}
          NOTARIZE_TEAM_ID:   ${{ secrets.MACOS_NOTARIZE_TEAM_ID }}
        run: ./bundle-macos.sh --dmg

      - name: Delete signing keychain
        if: always() && env.KEYCHAIN_PATH != ''
        run: security delete-keychain "$KEYCHAIN_PATH"

      - name: Upload DMG to release
        run: gh release upload "${{ github.ref_name }}" _bundle/photo-salon.dmg --clobber
        env:
          GH_TOKEN: ${{ github.token }}
