# Builds, signs, and uploads photo-salon.exe whenever a GitHub release is created.
#
# Required GitHub secrets (Settings → Secrets and variables → Actions → Secrets):
#   AZURE_TENANT_ID       — Azure AD tenant ID
#   AZURE_CLIENT_ID       — service principal / app registration client ID
#   AZURE_CLIENT_SECRET   — service principal client secret
#
# Required GitHub variables (Settings → Secrets and variables → Actions → Variables):
#   AZURE_TRUSTED_SIGNING_ENDPOINT     — endpoint hostname, e.g. wus2.codesigning.azure.net
#   AZURE_TRUSTED_SIGNING_ACCOUNT      — Trusted Signing account name
#   AZURE_TRUSTED_SIGNING_CERT_PROFILE — certificate profile name
#
# The service principal needs the "Trusted Signing Certificate Profile Signer" role
# on the Trusted Signing account in Azure Portal (Access control → Add role assignment).

name: Release

on:
  release:
    types: [created]

jobs:
  build-sign-upload:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install LLVM 18 and CMake
        run: |
          sudo apt-get update -q
          sudo apt-get install -y cmake clang-18 lld-18 llvm-18

      # /opt is root-owned; create and hand off to the runner before the cache step
      # so actions/cache can restore into it without sudo.
      - name: Prepare Qt host directory
        run: |
          sudo mkdir -p /opt/qt-linux
          sudo chown "$(id -un):$(id -gn)" /opt/qt-linux

      - name: Cache Qt host tools
        id: qt-cache
        uses: actions/cache@v4
        with:
          path: /opt/qt-linux
          key: qt-linux-6.11.1-gcc64

      - name: Install Qt host tools (moc/rcc for cross-compile)
        if: steps.qt-cache.outputs.cache-hit != 'true'
        run: |
          pip3 install --user --quiet aqtinstall
          export PATH="$HOME/.local/bin:$PATH"
          aqt install-qt --outputdir /opt/qt-linux linux desktop 6.11.1 linux_gcc_64 \
            --archives icu qtbase

      - name: Cache Windows cross-compile dependencies
        uses: actions/cache@v4
        with:
          path: |
            windows/msvc/include
            windows/sdk/include
            windows/qt-6.11
          key: windows-cross-deps-${{ hashFiles('fetch-windows-deps.sh') }}

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Install jsign
        run: |
          JSIGN_VER=$(curl -fsSL https://api.github.com/repos/ebourg/jsign/releases/latest \
            | jq -r .tag_name)
          curl -fsSLo /tmp/jsign.jar \
            "https://github.com/ebourg/jsign/releases/download/${JSIGN_VER}/jsign-${JSIGN_VER}.jar"
          printf '#!/bin/sh\nexec java -jar /tmp/jsign.jar "$@"\n' \
            | sudo tee /usr/local/bin/jsign > /dev/null
          sudo chmod +x /usr/local/bin/jsign

      - name: Log in to Azure
        run: |
          az login --service-principal \
            --tenant   "$AZURE_TENANT_ID" \
            --username "$AZURE_CLIENT_ID" \
            --password "$AZURE_CLIENT_SECRET"
        env:
          AZURE_TENANT_ID:     ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_ID:     ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}

      - name: Build and sign
        env:
          AZURE_TRUSTED_SIGNING_ENDPOINT:     ${{ vars.AZURE_TRUSTED_SIGNING_ENDPOINT }}
          AZURE_TRUSTED_SIGNING_ACCOUNT:      ${{ vars.AZURE_TRUSTED_SIGNING_ACCOUNT }}
          AZURE_TRUSTED_SIGNING_CERT_PROFILE: ${{ vars.AZURE_TRUSTED_SIGNING_CERT_PROFILE }}
        run: ./build-windows.sh

      - name: Upload to release
        run: gh release upload "${{ github.ref_name }}" _build_win/photo-salon.exe --clobber
        env:
          GH_TOKEN: ${{ github.token }}
